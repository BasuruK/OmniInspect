# This workflow builds and publishes a GitHub Release when a version tag is pushed.
# Triggered by: git tag v1.0.0 && git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # =========================================================================
  # Windows amd64 Build
  # =========================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download Oracle Instant Client (Windows)
        run: |
          curl -L -o instantclient-basic.zip https://download.oracle.com/otn_software/nt/instantclient/2326000/instantclient-basic-windows.x64-23.26.0.0.0.zip
          curl -L -o instantclient-sdk.zip https://download.oracle.com/otn_software/nt/instantclient/2326000/instantclient-sdk-windows.x64-23.26.0.0.0.zip
          New-Item -ItemType Directory -Force -Path C:\oracle_inst
          tar -xf instantclient-basic.zip -C C:\oracle_inst
          tar -xf instantclient-sdk.zip -C C:\oracle_inst
          Move-Item -Path C:\oracle_inst\instantclient_23_0 -Destination C:\oracle_inst\instantclient_23_7 -Force
        shell: pwsh

      - name: Add Oracle Instant Client to PATH
        run: echo "C:\oracle_inst\instantclient_23_7" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Download and setup ODPI-C
        run: python scripts/setup_odpi.py

      - name: Build ODPI-C library
        run: make odpi
        shell: cmd

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build release binary
        run: go build -v -ldflags "-X OmniView/internal/app.Version=${{ github.ref_name }}" -o omniview.exe ./cmd/omniview
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: -I${{ github.workspace }}/third_party/odpi/include
          CGO_LDFLAGS: -L${{ github.workspace }}/third_party/odpi/lib -lodpi -LC:/oracle_inst/instantclient_23_7 -loci

      - name: Package release archive
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item omniview.exe release/
          Copy-Item odpi.dll release/
          Compress-Archive -Path release/* -DestinationPath omniview-windows-amd64-${{ github.ref_name }}.zip -Force
        shell: pwsh

      - name: Generate SHA256 checksum
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "omniview-windows-amd64-${{ github.ref_name }}.zip").Hash.ToLower()
          "$hash  omniview-windows-amd64-${{ github.ref_name }}.zip" | Out-File -Encoding ascii -NoNewline "omniview-windows-amd64-${{ github.ref_name }}.zip.sha256"
        shell: pwsh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniview-windows-amd64
          path: |
            omniview-windows-amd64-${{ github.ref_name }}.zip
            omniview-windows-amd64-${{ github.ref_name }}.zip.sha256

  # =========================================================================
  # macOS arm64 (Apple Silicon) Build
  # =========================================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download Oracle Instant Client (macOS arm64) - Basic only
        run: |
          curl -L -o instantclient-basic.dmg https://download.oracle.com/otn_software/mac/instantclient/233023/instantclient-basic-macos.arm64-23.3.0.23.09.dmg

          # Clean up any previous installation (in case of re-run)
          sudo rm -rf /opt/oracle

          # Mount and extract basic
          hdiutil attach instantclient-basic.dmg -mountpoint /Volumes/instantclient-basic
          sudo mkdir -p /opt/oracle/instantclient_23_7
          # Files are directly at root of DMG, copy everything
          sudo cp -R /Volumes/instantclient-basic/* /opt/oracle/instantclient_23_7/
          hdiutil detach /Volumes/instantclient-basic

      - name: Run install_ic.sh to make Instant Client relocatable
        run: |
          cd /opt/oracle/instantclient_23_7
          sudo chmod +x install_ic.sh
          sudo ./install_ic.sh
        shell: bash

      - name: Download and setup ODPI-C
        run: python scripts/setup_odpi.py

      - name: Build ODPI-C library
        run: make odpi
        env:
          INSTANT_CLIENT_DIR: /opt/oracle/instantclient_23_7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build release binary
        run: go build -v -ldflags "-X OmniView/internal/app.Version=${{ github.ref_name }}" -o omniview ./cmd/omniview
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: -I${{ github.workspace }}/third_party/odpi/include
          CGO_LDFLAGS: -L${{ github.workspace }}/third_party/odpi/lib -lodpi -L/opt/oracle/instantclient_23_7 -lclntsh -Wl,-rpath,@executable_path -Wl,-rpath,@executable_path/third_party/odpi/lib -Wl,-rpath,@executable_path/instantclient_23_7
          INSTANT_CLIENT_DIR: /opt/oracle/instantclient_23_7

      - name: Package release archive (minimal - only required dylibs)
        run: |
          mkdir -p release/third_party/odpi/lib
          mkdir -p release/instantclient_23_7
          cp omniview release/
          cp third_party/odpi/lib/libodpi.dylib release/third_party/odpi/lib/
          # Copy only essential Oracle Instant Client dylibs (after install_ic.sh makes them relocatable)
          for lib in libclntsh.dylib libnnz23.dylib libociei.dylib libons.dylib \
                     libssl.dylib libcrypto.dylib libnss3.dylib; do
            if [ -f /opt/oracle/instantclient_23_7/$lib ]; then
              cp /opt/oracle/instantclient_23_7/$lib release/instantclient_23_7/
            fi
          done
          # Also copy any dependent dylibs that might be in subdirectories
          find /opt/oracle/instantclient_23_7 -name '*.dylib' -type f | while read lib; do
            cp "$lib" release/instantclient_23_7/
          done
          # Fix libodpi.dylib to reference Oracle dylibs at @executable_path/instantclient_23_7/
          # This is needed because libodpi.dylib is built with @rpath/libclntsh references
          install_name_tool -change @rpath/libclntsh.dylib @executable_path/instantclient_23_7/libclntsh.dylib release/third_party/odpi/lib/libodpi.dylib || true
          install_name_tool -change @rpath/libclntsh.dylib.23.1 @executable_path/instantclient_23_7/libclntsh.dylib.23.1 release/third_party/odpi/lib/libodpi.dylib || true
          tar -czf omniview-darwin-arm64-${{ github.ref_name }}.tar.gz -C release .
        shell: bash

      - name: Generate SHA256 checksum
        run: |
          shasum -a 256 omniview-darwin-arm64-${{ github.ref_name }}.tar.gz | awk '{print $1 "  " $2}' > omniview-darwin-arm64-${{ github.ref_name }}.tar.gz.sha256
        shell: bash

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniview-darwin-arm64
          path: |
            omniview-darwin-arm64-${{ github.ref_name }}.tar.gz
            omniview-darwin-arm64-${{ github.ref_name }}.tar.gz.sha256

  # =========================================================================
  # Publish GitHub Release
  # =========================================================================
  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/omniview-windows-amd64/*.zip
            dist/omniview-windows-amd64/*.sha256
            dist/omniview-darwin-arm64/*.tar.gz
            dist/omniview-darwin-arm64/*.sha256
